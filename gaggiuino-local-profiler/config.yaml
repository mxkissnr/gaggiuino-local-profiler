name: "GLP — Gaggiuino Local Profiler"
version: "2.2.5"
slug: "gaggiuino_local_profiler"
description: "Local shot profiler for the Gaggiuino espresso machine — shot archive, coffee library with flavor wheel, analytics and optional order management, all local, no cloud."
url: "https://github.com/mxkissnr/gaggiuino-local-profiler"
image: "ghcr.io/mxkissnr/gaggiuino-local-profiler/{arch}"
arch:
  - amd64
  - armv7
  - aarch64
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
init: false
ingress: true
ingress_port: 8099
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "GLP web interface (required for the companion HA integration)"
panel_icon: mdi:coffee
panel_title: "GLP"
options:
  machine_host: "gaggiuino.local"
  sync_interval: 5
  switch_entity: ""
  preheat_time: 20
  enable_orders: false
schema:
  machine_host: str
  sync_interval: int(1,60)
  switch_entity: str?
  preheat_time: int(1,120)?
  enable_orders: bool?
