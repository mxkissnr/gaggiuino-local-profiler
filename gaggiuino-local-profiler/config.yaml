name: "GLP — Gaggiuino Local Profiler"
version: "1.63.0"
slug: "gaggiuino_local_profiler"
description: "Local shot profiler for the Gaggiuino espresso machine — records, stores and visualises your espresso shots."
url: "https://github.com/mxkissnr/gaggiuino-local-profiler"
arch:
  - amd64
  - armv7
  - aarch64
startup: application
boot: auto
homeassistant_api: true
init: false
ingress: true
ingress_port: 8099
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "GLP web interface (required for the companion HA integration)"
panel_icon: mdi:coffee
panel_title: "GLP"
options:
  machine_host: "gaggia.intern"
  sync_interval: 5
  switch_entity: ""
  preheat_time: 20
  enable_orders: false
schema:
  machine_host: str
  sync_interval: int(1,60)
  switch_entity: str?
  preheat_time: int(1,120)?
  enable_orders: bool?
