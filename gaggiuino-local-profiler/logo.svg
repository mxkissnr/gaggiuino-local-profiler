<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" width="720" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <clipPath id="bgClip">
      <rect width="720" height="140" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="14" fill="url(#bg)"/>

  <!-- Left amber accent bar -->
  <rect width="4" height="140" rx="2" fill="#f59e0b" clip-path="url(#bgClip)"/>

  <!-- Icon container: amber rounded square -->
  <rect x="28" y="30" width="80" height="80" rx="20" fill="url(#iconBg)"/>

  <!-- Coffee cup (flat / material icon style, white on amber) -->
  <!-- Steam -->
  <path d="M 52,44 Q 49,37 52,30" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <path d="M 68,42 Q 65,35 68,28" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Cup body -->
  <path d="M 46,52 L 48,82 L 88,82 L 90,52 Z" fill="white" rx="2"/>
  <!-- Handle -->
  <path d="M 90,60 Q 102,60 102,68 Q 102,76 90,76" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Saucer -->
  <rect x="42" y="84" width="54" height="5" rx="2.5" fill="rgba(255,255,255,0.55)"/>

  <!-- Divider -->
  <line x1="136" y1="28" x2="136" y2="112" stroke="#27272a" stroke-width="1"/>

  <!-- GLP wordmark -->
  <text x="162" y="102"
        font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="70" font-weight="800" fill="white" letter-spacing="-3">GLP</text>

  <!-- Tagline -->
  <text x="165" y="124"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="500" fill="#52525b" letter-spacing="3.5">GAGGIUINO LOCAL PROFILER</text>

  <!-- Right: subtle pressure-curve decoration -->
  <polyline
    points="460,108 480,96 500,72 522,46 548,42 572,44 596,42 620,44 645,46 668,50"
    fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <polyline
    points="460,108 480,104 500,88 522,52 548,44 572,38 596,36 620,37 645,39 668,43"
    fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>

  <!-- HA chip top-right -->
  <rect x="636" y="24" width="70" height="26" rx="13" fill="#1c1917"/>
  <rect x="636" y="24" width="70" height="26" rx="13" fill="none" stroke="#292524" stroke-width="1"/>
  <text x="671" y="41"
        font-family="system-ui, sans-serif" font-size="10" font-weight="600"
        fill="#78716c" text-anchor="middle" letter-spacing="0.5">HA ADD-ON</text>
</svg>
