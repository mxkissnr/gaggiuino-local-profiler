name: Test and build

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gaggiuino-local-profiler

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
