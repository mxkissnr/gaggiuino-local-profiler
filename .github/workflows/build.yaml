name: Build and publish Docker images

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: armv7
            platform: linux/arm/v7
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' gaggiuino-local-profiler/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION for ${{ matrix.arch }}"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./gaggiuino-local-profiler
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          tags: |
            ghcr.io/mxkissnr/gaggiuino-local-profiler/${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/mxkissnr/gaggiuino-local-profiler/${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.title=GLP — Gaggiuino Local Profiler
            org.opencontainers.image.description=Local shot profiler for Gaggiuino espresso machine
            org.opencontainers.image.source=https://github.com/mxkissnr/gaggiuino-local-profiler
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            io.hass.name=GLP — Gaggiuino Local Profiler
