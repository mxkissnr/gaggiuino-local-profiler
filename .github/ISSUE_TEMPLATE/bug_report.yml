name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug! Please fill in the details below."

  - type: input
    id: version
    attributes:
      label: Add-on version
      description: Visible in Home Assistant → Settings → Add-ons → Gaggiuino Local Profiler
      placeholder: "e.g. 1.62.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click on …
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Paste any relevant output from HA logs (Settings → System → Logs) or the browser console."
      render: text
